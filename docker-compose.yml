services:
  jekyll:
    build:
      context: .
      target: build
    ports:
      - "4000:4000"
      - "35729:35729"
    working_dir: /app
    volumes:
      - .:/app:delegated
      - /app/_site
      - /app/.sass-cache
      - /app/.jekyll-cache
    command: bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload --livereload-port 35729 --incremental